# Scheduler config (TOML). Environment variables override these values.
# Keep only bootstrap infrastructure values here.
# Product runtime policies are configured from Studio Settings > Runtime.

[scheduler]
port = "8200"
token = ""
data_dir = "data" # optional local state path

[database]
url = "postgres://user:pass@localhost:5432/spec_axis"

[redis]
url = "redis://localhost:6379/0"

[security]
encryption_key = ""

[studio]
# Base URL for Studio (used by pipeline source_checkout and review_gate job types)
url = "http://localhost:8109"
# Optional: token presented to Studio as `X-Scheduler-Token`. If empty, Scheduler will
# fall back to the main `SCHEDULER_TOKEN` env var / `[scheduler].token` value.
token = ""
