# Runner config (TOML). Environment variables override these values.

[runner]
port = "8200"
token = ""
concurrency = 4
queue = "analysis"
analyze_timeout = "300s"
data_dir = "data"

[database]
url = "postgres://user:pass@localhost:5432/spec_axis"

[redis]
url = "redis://localhost:6379/0"

[pipeline]
queue = "pipelines"
concurrency = 4
run_timeout = "2h"
log_retention_days = 30
artifact_retention_days = 30

[security]
encryption_key = ""
